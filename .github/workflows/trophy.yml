name: Generate Trophy (Self-Hosted)

on:
  schedule:
    - cron: "0 0 * * *"   # regenerates once a day
  workflow_dispatch:        # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate trophy.svg
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: ${{ github.repository_owner }}
          output_path: trophy.svg
          theme: radical
          row: "2"
          column: "4"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated trophy.svg
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update trophy.svg"
          file_pattern: trophy.svg
